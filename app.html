<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosami App Detail</title>
  <meta name="description" content="App details for NosamiDev Android apps.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">Nosami<span>.</span></a>
    </div>
  </nav>

  <main class="detail-page">
    <div class="container">
      <a class="back-link" href="index.html" aria-label="Back to all apps">&larr; All apps</a>

      <div id="app-detail" aria-live="polite">
        <p class="loading-state">Loading...</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <a class="footer-brand" href="index.html">Nosami<span>.</span></a>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const detailRoot = document.querySelector("#app-detail");
      const params = new URLSearchParams(window.location.search);
      const appId = params.get("id");

      const formatStatus = (status) => {
        if (status === "live") {
          return "Live";
        }

        return "Coming Soon";
      };

      const getInitials = (name) => name
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((word) => word[0])
        .join("")
        .toUpperCase();

      const createIcon = (app) => {
        const icon = document.createElement("div");
        icon.className = "detail-icon app-icon-fallback";
        icon.textContent = getInitials(app.name);
        icon.setAttribute("aria-hidden", "true");

        if (app.icon) {
          const image = document.createElement("img");
          image.alt = "";
          image.loading = "lazy";
          image.addEventListener("load", () => {
            icon.textContent = "";
            icon.classList.remove("app-icon-fallback");
            icon.append(image);
          }, { once: true });
          image.src = app.icon;
        }

        return icon;
      };

      const createParagraphs = (text) => {
        const fragment = document.createDocumentFragment();
        String(text || "")
          .split(/\n{2,}/)
          .map((paragraph) => paragraph.trim())
          .filter(Boolean)
          .forEach((paragraph) => {
            const p = document.createElement("p");
            p.textContent = paragraph;
            fragment.append(p);
          });

        return fragment;
      };

      const renderNotFound = () => {
        detailRoot.replaceChildren();

        const message = document.createElement("section");
        message.className = "not-found-state";

        const heading = document.createElement("h1");
        heading.textContent = "App not found.";

        const link = document.createElement("a");
        link.href = "index.html";
        link.textContent = "Go back to all apps.";

        message.append(heading, link);
        detailRoot.append(message);
      };

      const renderApp = (app) => {
        detailRoot.replaceChildren();
        document.title = `${app.name} - Nosami Apps`;

        const article = document.createElement("article");
        article.className = "detail-panel";

        const header = document.createElement("header");
        header.className = "detail-header";
        header.append(createIcon(app));

        const headingWrap = document.createElement("div");
        headingWrap.className = "detail-heading";

        const title = document.createElement("h1");
        title.textContent = app.name;

        const meta = document.createElement("div");
        meta.className = "detail-meta";

        if (app.category) {
          const category = document.createElement("span");
          category.className = "badge badge-accent";
          category.textContent = app.category;
          meta.append(category);
        }

        const status = document.createElement("span");
        status.className = `badge ${app.status === "live" ? "badge-live" : "badge-coming-soon"}`;
        status.textContent = formatStatus(app.status);
        meta.append(status);

        const shortDesc = document.createElement("p");
        shortDesc.className = "detail-short-desc";
        shortDesc.textContent = app.shortDesc;

        headingWrap.append(title, meta, shortDesc);

        if (app.status === "live" && app.playStoreUrl) {
          const playStore = document.createElement("a");
          playStore.className = "btn btn-primary";
          playStore.href = app.playStoreUrl;
          playStore.target = "_blank";
          playStore.rel = "noopener noreferrer";
          playStore.textContent = "View on Play Store";
          headingWrap.append(playStore);
        }

        header.append(headingWrap);
        article.append(header);

        const description = document.createElement("section");
        description.className = "detail-section";

        const descriptionHeading = document.createElement("h2");
        descriptionHeading.textContent = "Overview";

        const descriptionBody = document.createElement("div");
        descriptionBody.className = "detail-description";
        descriptionBody.append(createParagraphs(app.fullDesc));

        description.append(descriptionHeading, descriptionBody);
        article.append(description);

        if (Array.isArray(app.screenshots) && app.screenshots.length > 0) {
          const screenshots = document.createElement("section");
          screenshots.className = "detail-section screenshots-section";

          const screenshotsHeading = document.createElement("h2");
          screenshotsHeading.textContent = "Screenshots";

          const row = document.createElement("div");
          row.className = "screenshots-row";

          app.screenshots.forEach((src, index) => {
            const image = document.createElement("img");
            image.src = src;
            image.alt = `${app.name} screenshot ${index + 1}`;
            image.loading = "lazy";
            row.append(image);
          });

          screenshots.append(screenshotsHeading, row);
          article.append(screenshots);
        }

        const legal = document.createElement("nav");
        legal.className = "legal-links";
        legal.setAttribute("aria-label", "Legal links");

        if (app.privacyUrl) {
          const privacy = document.createElement("a");
          privacy.href = app.privacyUrl;
          privacy.textContent = "Privacy Policy";
          legal.append(privacy);
        }

        if (app.termsUrl) {
          const terms = document.createElement("a");
          terms.href = app.termsUrl;
          terms.textContent = "Terms of Service";
          legal.append(terms);
        }

        article.append(legal);
        detailRoot.append(article);
      };

      if (!appId) {
        renderNotFound();
        return;
      }

      fetch("apps.json")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Unable to load apps.");
          }

          return response.json();
        })
        .then((apps) => {
          const app = Array.isArray(apps)
            ? apps.find((entry) => entry.id === appId)
            : null;

          if (!app) {
            renderNotFound();
            return;
          }

          renderApp(app);
        })
        .catch(() => {
          renderNotFound();
        });
    });
  </script>
</body>
</html>
