<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosami Admin</title>
  <meta name="description" content="Admin panel for Nosami Apps JSON entries.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section id="password-gate" class="password-gate" aria-labelledby="gate-heading">
      <form class="password-box" id="password-form">
        <h1 id="gate-heading">Admin</h1>
        <label class="field">
          <span>Password</span>
          <input id="password-input" type="password" autocomplete="current-password" required>
        </label>
        <button class="btn btn-primary" type="submit">Enter</button>
        <p id="password-error" class="form-error" aria-live="polite"></p>
      </form>
    </section>

    <section id="admin-ui" class="admin-ui hidden" aria-labelledby="admin-heading">
      <nav class="site-nav">
        <div class="nav-inner">
          <a class="nav-logo" href="index.html">Nosami<span>.</span></a>
        </div>
      </nav>

      <div class="container admin-container">
        <header class="admin-topbar">
          <div>
            <h1 id="admin-heading">Apps admin</h1>
            <p>Manage app entries and export updated JSON.</p>
          </div>
          <a class="back-link" href="index.html">View site</a>
        </header>

        <div class="admin-layout">
          <aside class="admin-sidebar" aria-labelledby="apps-list-heading">
            <div class="admin-sidebar-head">
              <h2 id="apps-list-heading">Apps</h2>
              <button class="btn" id="add-app-button" type="button">Add new app</button>
            </div>
            <div id="apps-list" class="admin-app-list" aria-live="polite">
              <p class="loading-state">Loading...</p>
            </div>
          </aside>

          <section class="admin-editor" aria-labelledby="form-heading">
            <h2 id="form-heading">App entry</h2>
            <form id="app-form" class="admin-form">
              <label class="field">
                <span>Name</span>
                <input id="name" name="name" type="text" required>
              </label>

              <label class="field">
                <span>ID</span>
                <input id="id" name="id" type="text" required>
              </label>

              <label class="field">
                <span>Short description</span>
                <input id="shortDesc" name="shortDesc" type="text" required>
              </label>

              <label class="field">
                <span>Full description</span>
                <textarea id="fullDesc" name="fullDesc" required></textarea>
              </label>

              <label class="field">
                <span>Icon path</span>
                <input id="icon" name="icon" type="text" placeholder="assets/draw-together/icon.png">
              </label>

              <label class="field">
                <span>Screenshots</span>
                <textarea id="screenshots" name="screenshots" placeholder="One path per line"></textarea>
              </label>

              <label class="field">
                <span>Play Store URL</span>
                <input id="playStoreUrl" name="playStoreUrl" type="url">
              </label>

              <label class="field">
                <span>Privacy URL</span>
                <input id="privacyUrl" name="privacyUrl" type="text" required>
              </label>

              <label class="field">
                <span>Terms URL</span>
                <input id="termsUrl" name="termsUrl" type="text" required>
              </label>

              <div class="form-row">
                <label class="field">
                  <span>Status</span>
                  <select id="status" name="status">
                    <option value="live">live</option>
                    <option value="coming-soon">coming-soon</option>
                  </select>
                </label>

                <label class="field">
                  <span>Category</span>
                  <input id="category" name="category" type="text" required>
                </label>

                <label class="field">
                  <span>Published date</span>
                  <input id="publishedDate" name="publishedDate" type="date" required>
                </label>
              </div>

              <button class="btn btn-primary" type="submit">Save</button>
            </form>

            <section id="json-output-wrap" class="json-output-wrap hidden" aria-labelledby="json-output-heading">
              <div class="json-output-head">
                <label id="json-output-heading" for="json-output">Copy this and commit as apps.json</label>
                <button class="btn" id="copy-json-button" type="button">Copy</button>
              </div>
              <textarea id="json-output" readonly></textarea>
              <p id="copy-status" class="copy-status" aria-live="polite"></p>
            </section>
          </section>
        </div>
      </div>

      <footer class="site-footer">
        <div class="footer-inner">
          <a class="footer-brand" href="index.html">Nosami<span>.</span></a>
        </div>
      </footer>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const PASSWORD_HASH = "74a5eb16824a5d84649c83806cbe4e91540e3fd5f106f8e9b0ee5bc250148dc4";

      const gate = document.querySelector("#password-gate");
      const adminUi = document.querySelector("#admin-ui");
      const passwordForm = document.querySelector("#password-form");
      const passwordInput = document.querySelector("#password-input");
      const passwordError = document.querySelector("#password-error");
      const appsList = document.querySelector("#apps-list");
      const addAppButton = document.querySelector("#add-app-button");
      const appForm = document.querySelector("#app-form");
      const jsonOutputWrap = document.querySelector("#json-output-wrap");
      const jsonOutput = document.querySelector("#json-output");
      const copyJsonButton = document.querySelector("#copy-json-button");
      const copyStatus = document.querySelector("#copy-status");

      let apps = [];
      let originalEditingId = null;
      let idTouched = false;

      const fields = {
        id: document.querySelector("#id"),
        name: document.querySelector("#name"),
        shortDesc: document.querySelector("#shortDesc"),
        fullDesc: document.querySelector("#fullDesc"),
        icon: document.querySelector("#icon"),
        screenshots: document.querySelector("#screenshots"),
        playStoreUrl: document.querySelector("#playStoreUrl"),
        privacyUrl: document.querySelector("#privacyUrl"),
        termsUrl: document.querySelector("#termsUrl"),
        status: document.querySelector("#status"),
        category: document.querySelector("#category"),
        publishedDate: document.querySelector("#publishedDate")
      };

      const hashPassword = async (password) => {
        const data = new TextEncoder().encode(password);
        const hash = await crypto.subtle.digest("SHA-256", data);
        return [...new Uint8Array(hash)]
          .map((byte) => byte.toString(16).padStart(2, "0"))
          .join("");
      };

      const slugify = (value) => String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      const normalizeDate = (value) => {
        if (value) {
          return value;
        }

        return new Date().toISOString().slice(0, 10);
      };

      const setFormMode = (app = null) => {
        originalEditingId = app ? app.id : null;
        idTouched = Boolean(app);
        appForm.reset();

        fields.id.value = app?.id || "";
        fields.name.value = app?.name || "";
        fields.shortDesc.value = app?.shortDesc || "";
        fields.fullDesc.value = app?.fullDesc || "";
        fields.icon.value = app?.icon || "";
        fields.screenshots.value = Array.isArray(app?.screenshots) ? app.screenshots.join("\n") : "";
        fields.playStoreUrl.value = app?.playStoreUrl || "";
        fields.privacyUrl.value = app?.privacyUrl || "";
        fields.termsUrl.value = app?.termsUrl || "";
        fields.status.value = app?.status || "coming-soon";
        fields.category.value = app?.category || "";
        fields.publishedDate.value = normalizeDate(app?.publishedDate);
        copyStatus.textContent = "";
      };

      const getFormApp = () => ({
        id: fields.id.value.trim(),
        name: fields.name.value.trim(),
        shortDesc: fields.shortDesc.value.trim(),
        fullDesc: fields.fullDesc.value.trim(),
        icon: fields.icon.value.trim(),
        screenshots: fields.screenshots.value
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean),
        playStoreUrl: fields.playStoreUrl.value.trim(),
        privacyUrl: fields.privacyUrl.value.trim(),
        termsUrl: fields.termsUrl.value.trim(),
        status: fields.status.value,
        category: fields.category.value.trim(),
        publishedDate: fields.publishedDate.value
      });

      const showJsonOutput = () => {
        jsonOutput.value = JSON.stringify(apps, null, 2);
        jsonOutputWrap.classList.remove("hidden");
      };

      const renderAppsList = () => {
        appsList.replaceChildren();

        if (!apps.length) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = "No apps yet.";
          appsList.append(empty);
          return;
        }

        apps.forEach((app) => {
          const item = document.createElement("div");
          item.className = "admin-app-item";

          const details = document.createElement("div");
          const name = document.createElement("strong");
          name.textContent = app.name || app.id;
          const status = document.createElement("span");
          status.className = `badge ${app.status === "live" ? "badge-live" : "badge-coming-soon"}`;
          status.textContent = app.status === "live" ? "Live" : "Coming Soon";
          details.append(name, status);

          const edit = document.createElement("button");
          edit.className = "btn";
          edit.type = "button";
          edit.textContent = "Edit";
          edit.addEventListener("click", () => setFormMode(app));

          item.append(details, edit);
          appsList.append(item);
        });
      };

      const loadApps = async () => {
        const response = await fetch("apps.json");

        if (!response.ok) {
          throw new Error("Unable to load apps.json.");
        }

        const data = await response.json();
        apps = Array.isArray(data) ? data : [];
        renderAppsList();
        setFormMode(apps[0] || null);
      };

      passwordForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        passwordError.textContent = "";

        const enteredHash = await hashPassword(passwordInput.value);

        if (enteredHash !== PASSWORD_HASH) {
          passwordError.textContent = "Incorrect password";
          passwordInput.classList.remove("shake");
          void passwordInput.offsetWidth;
          passwordInput.classList.add("shake");
          passwordInput.select();
          return;
        }

        gate.classList.add("hidden");
        adminUi.classList.remove("hidden");

        try {
          await loadApps();
        } catch (error) {
          appsList.replaceChildren();
          const message = document.createElement("p");
          message.className = "empty-state";
          message.textContent = "Could not load apps.json.";
          appsList.append(message);
          setFormMode();
        }
      });

      addAppButton.addEventListener("click", () => {
        setFormMode();
        fields.name.focus();
      });

      fields.name.addEventListener("input", () => {
        if (!idTouched) {
          fields.id.value = slugify(fields.name.value);
        }
      });

      fields.id.addEventListener("input", () => {
        idTouched = true;
        fields.id.value = slugify(fields.id.value);
      });

      appForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const nextApp = getFormApp();
        const existingIndex = apps.findIndex((app) => app.id === originalEditingId || app.id === nextApp.id);

        if (existingIndex >= 0) {
          apps[existingIndex] = nextApp;
        } else {
          apps.push(nextApp);
        }

        originalEditingId = nextApp.id;
        idTouched = true;
        apps.sort((a, b) => new Date(b.publishedDate) - new Date(a.publishedDate));
        renderAppsList();
        showJsonOutput();
      });

      copyJsonButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(jsonOutput.value);
          copyStatus.textContent = "Copied.";
        } catch (error) {
          jsonOutput.focus();
          jsonOutput.select();
          copyStatus.textContent = "Select the JSON and copy it manually.";
        }
      });
    });
  </script>
</body>
</html>
